<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Viewer - Epistemic Toolbox</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- Highlight.js for syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/html.min.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    
    <!-- Outstanding Markdown Rendering Styles -->
    <link rel="stylesheet" href="note.css">

    <style>
        :root {
            --bg-deep: #080a0f;
            --bg-primary: #0d1117;
            --bg-elevated: #151b24;
            --bg-card: rgba(20, 26, 35, 0.65);
            --fg-primary: #f0f4f8;
            --fg-secondary: #8b95a5;
            --fg-muted: #4a5568;
            --accent-primary: #d4a84b;
            --accent-secondary: #5ec4b2;
            --accent-glow: rgba(212, 168, 75, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-elevated: rgba(255, 255, 255, 0.1);
            --border-accent: rgba(212, 168, 75, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--fg-primary);
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        main {
            flex: 1;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--fg-muted);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .bg-atmosphere {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212, 168, 75, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(94, 196, 178, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-primary) 100%);
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 95% 70% at 50% 30%, black, transparent);
        }

        .bg-noise {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .nav-blur {
            background: rgba(8, 10, 15, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border-subtle);
            height: 72px;
            display: flex;
            align-items: center;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            position: relative;
            padding: 0;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.15, 0.8, 0.3, 1);
        }

        .brand-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: radial-gradient(ellipse at center, rgba(212, 168, 75, 0.08), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .brand-container:hover::before {
            opacity: 1;
        }

        .brand-icon {
            position: relative;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--accent-primary);
            stroke-width: 1.5;
            fill: none;
            filter: drop-shadow(0 0 6px rgba(212, 168, 75, 0.4));
            transition: all 0.4s ease;
        }

        .brand-container:hover .brand-icon svg {
            filter: drop-shadow(0 0 12px rgba(212, 168, 75, 0.6));
            transform: rotate(10deg) scale(1.05);
        }

        .brand-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--fg-primary);
            position: relative;
            z-index: 1;
        }

        .brand-text span {
            color: var(--fg-secondary);
            font-weight: 400;
            margin-right: 0.25em;
        }

        /* Note Content Styles */
        .note-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 6rem 2rem 3rem 2rem;
            display: flex;
            gap: 2rem;
        }

        /* Sidebar */
        .note-sidebar {
            width: 300px;
            flex-shrink: 0;
            position: sticky;
            top: 250px;
            height: fit-content;
            max-height: calc(100vh - 250px);
            overflow-y: auto;
            border-left: 1px solid var(--border-subtle);
            padding-left: 1rem;
        }

        .sidebar-section {
            background: rgba(20, 26, 35, 0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 1.75rem 1.5rem;
            backdrop-filter: blur(12px);
        }

        .sidebar-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--fg-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-title svg {
            width: 14px;
            height: 14px;
            stroke: var(--accent-secondary);
            stroke-width: 1.5;
            fill: none;
            opacity: 0.6;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .topic-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0.6rem;
            margin-left: 0.5rem;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 6px;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.3, 1);
            cursor: pointer;
            text-decoration: none;
            position: relative;
        }

        .topic-item::before {
            content: '';
            position: absolute;
            left: -0.5rem;
            top: 50%;
            transform: translateY(-50%);
            width: 2px;
            height: 0;
            background: var(--accent-primary);
            transition: height 0.3s ease;
            border-radius: 2px;
        }

        .topic-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .topic-item:hover::before {
            height: 40%;
        }

        .topic-item.active {
            background: rgba(212, 168, 75, 0.06);
        }

        .topic-item.active::before {
            height: 70%;
        }

        .topic-icon {
            width: 10px;
            height: 10px;
            stroke: var(--fg-muted);
            stroke-width: 2;
            fill: none;
            flex-shrink: 0;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .topic-item:hover .topic-icon {
            stroke: var(--accent-secondary);
            opacity: 0.8;
        }

        .topic-item.active .topic-icon {
            stroke: var(--accent-primary);
            opacity: 1;
        }

        .topic-name {
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.8rem;
            color: var(--fg-secondary);
            font-weight: 400;
            letter-spacing: 0.01em;
            transition: all 0.3s ease;
        }

        .topic-item:hover .topic-name {
            color: var(--fg-primary);
        }

        .topic-item.active .topic-name {
            color: var(--fg-primary);
            font-weight: 500;
        }

        .topic-badge {
            display: none;
        }

        /* Main content area */
        .note-main {
            flex: 1;
            min-width: 0;
        }

        .note-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .note-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--fg-primary);
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        .note-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--fg-muted);
        }

        .note-meta-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .note-meta-item svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .note-content {
            background: rgba(20, 26, 35, 0.5);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 2.5rem;
            backdrop-filter: blur(8px);
        }

        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            min-height: 400px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-elevated);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--fg-muted);
        }

        /* Error State */
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            min-height: 400px;
            text-align: center;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            stroke: var(--fg-muted);
            stroke-width: 1.5;
            fill: none;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .error-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--fg-primary);
            margin-bottom: 0.75rem;
        }

        .error-message {
            font-size: 1rem;
            color: var(--fg-muted);
            max-width: 500px;
            line-height: 1.6;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(212, 168, 75, 0.1);
            border: 1px solid rgba(212, 168, 75, 0.2);
            border-radius: 8px;
            color: var(--accent-primary);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: rgba(212, 168, 75, 0.2);
            border-color: rgba(212, 168, 75, 0.4);
            transform: translateY(-2px);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Footer */
        .site-footer {
            background: rgba(8, 10, 15, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top: 1px solid var(--border-subtle);
            padding: 2rem 0;
            position: relative;
        }

        .footer-bg-fade {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(8, 10, 15, 0.3) 100%);
            pointer-events: none;
        }

        .footer-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
            margin-bottom: 2rem;
        }

        .footer-inner {
            display: flex;
            align-items: center;
        }

        .footer-brand-group {
            flex: 0 0 auto;
            min-width: 0;
        }

        .footer-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--fg-primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-brand:hover {
            color: var(--accent-primary);
        }

        .footer-links-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            margin-right: 44%;
        }

        .footer-links {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-right: calc(-300px - 2rem);
        }

        .footer-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--fg-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .footer-link:hover {
            color: var(--accent-primary);
        }

        @media (max-width: 768px) {
            .footer-inner {
                flex-direction: column;
                text-align: center;
            }

            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="bg-atmosphere"></div>
    <div class="bg-pattern"></div>
    <div class="bg-noise"></div>

    <!-- Header -->
    <nav class="fixed top-0 left-0 right-0 z-50 nav-blur">
        <div class="max-w-[1600px] mx-auto px-6 md:px-8 h-full w-full flex items-center">
            <a href="/toolbox" class="brand-container">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <div class="brand-text"><span>Epistemic</span>Toolbox</div>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="note-container">
            <!-- Main Content -->
            <div class="note-main">
                <div id="loading" class="loading-state">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Loading note...</div>
                </div>

                <div id="error" class="error-state" style="display: none;">
                    <svg class="error-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10" stroke-width="1.5"/>
                        <path d="M12 8v4" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M12 16h.01" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                    <h1 class="error-title">Note Not Found</h1>
                    <p class="error-message" id="errorMessage">The requested note could not be loaded.</p>
                    <a href="/" class="back-link">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 12H5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Back to Toolbox
                    </a>
                </div>

                <div id="note-viewer" style="display: none;">
                    <div class="note-header">
                        <h1 class="note-title" id="note-title">Note Title</h1>
                        <div class="note-meta">
                            <div class="note-meta-item">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M14 2v6h6" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M16 13H8" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M16 17H8" stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M10 9H8" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <span id="note-filename">note.md</span>
                            </div>
                            <div class="note-meta-item">
                                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 8v4l3 3" stroke-linecap="round" stroke-linejoin="round"/>
                                    <circle cx="12" cy="12" r="9" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                <span id="note-readtime">2 min read</span>
                            </div>
                        </div>
                    </div>

                    <div class="note-content">
                        <div class="markdown-body" id="note-body">
                            <!-- Markdown content will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar (Right side) -->
            <aside class="note-sidebar" id="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 3h18v18H3z" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M9 3v18" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        Topics
                    </div>
                    <div class="topic-list" id="topic-list">
                        <!-- Topics will be dynamically loaded here -->
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-bg-fade"></div>
        <div class="max-w-[1600px] mx-auto px-[2rem]">
            <div class="footer-divider"></div>
            <div class="footer-inner">
                <div class="footer-brand-group">
                    <a href="/toolbox" class="footer-brand">Epistemic Toolbox</a>
                </div>
                <div class="footer-links-container">
                    <div class="footer-links">
                    <a href="about.html" class="footer-link">About</a>
                    <a href="docs.html" class="footer-link">Documentation</a>
                    <a href="terminology.html" class="footer-link">Terminology</a>
                    <button class="footer-link" id="footer-help-btn">Help</button>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Load note and extract table of contents
        async function loadNote() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const noteViewer = document.getElementById('note-viewer');
            const errorMessage = document.getElementById('errorMessage');

            // Get note name from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const noteName = urlParams.get('note');

            if (!noteName) {
                loading.style.display = 'none';
                error.style.display = 'flex';
                errorMessage.textContent = 'No note specified in URL. Please provide a note name.';
                return;
            }

            try {
                // Sanitize note name to prevent directory traversal
                const sanitizedName = noteName.replace(/[^a-zA-Z0-9_-]/g, '');
                const notePath = `../data/note/${sanitizedName}.md`;

                const response = await fetch(notePath);

                if (!response.ok) {
                    throw new Error(`Note "${noteName}" not found`);
                }

                const markdown = await response.text();

                // Extract table of contents from headings
                const toc = extractTableOfContents(markdown);
                updateSidebarTOC(toc);

                // Parse markdown and extract title from first h1 or use filename
                const lines = markdown.split('\n');
                let title = noteName.replace(/-/g, ' ').replace(/_/g, ' ');

                for (const line of lines) {
                    if (line.startsWith('# ')) {
                        title = line.substring(2).trim();
                        break;
                    } else if (line.startsWith('## ')) {
                        title = line.substring(3).trim();
                        break;
                    }
                }

                // Update UI
                document.getElementById('note-title').textContent = title;
                document.getElementById('note-filename').textContent = `${sanitizedName}.md`;
                
                // Estimate read time (average 200 words per minute)
                const wordCount = markdown.split(/\s+/).length;
                const readTime = Math.ceil(wordCount / 200);
                document.getElementById('note-readtime').textContent = `${readTime} min read`;

                // Render markdown
                document.getElementById('note-body').innerHTML = marked.parse(markdown);

                // Add syntax highlighting to code blocks
                hljs.highlightAll();

                // Add IDs to headings for linking
                addHeadingIds();

                // Initialize scroll spy
                initScrollSpy();

                // Show note viewer
                loading.style.display = 'none';
                noteViewer.style.display = 'block';

            } catch (err) {
                console.error('Error loading note:', err);
                loading.style.display = 'none';
                error.style.display = 'flex';
                errorMessage.textContent = err.message || 'Failed to load the note. Please try again.';
            }
        }

        // Extract table of contents from markdown
        function extractTableOfContents(markdown) {
            const toc = [];
            const lines = markdown.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                
                // Match h2 and h3 headings
                if (line.startsWith('## ')) {
                    toc.push({
                        level: 2,
                        text: line.substring(3).trim(),
                        index: i
                    });
                } else if (line.startsWith('### ')) {
                    toc.push({
                        level: 3,
                        text: line.substring(4).trim(),
                        index: i
                    });
                }
            }
            
            return toc;
        }

        // Update sidebar with table of contents
        function updateSidebarTOC(toc) {
            const topicList = document.getElementById('topic-list');
            topicList.innerHTML = '';

            if (toc.length === 0) {
                document.getElementById('sidebar').style.display = 'none';
                document.querySelector('.note-main').style.flex = '1';
                return;
            }

            document.getElementById('sidebar').style.display = 'block';
            document.querySelector('.note-main').style.flex = '1';

            toc.forEach((item, index) => {
                // Create sidebar item
                const topicItem = document.createElement('a');
                topicItem.href = `#heading-${index}`;
                topicItem.className = `topic-item ${item.level === 3 ? 'sub-item' : ''}`;
                topicItem.style.paddingLeft = item.level === 3 ? '1.5rem' : '0.75rem';
                
                topicItem.innerHTML = `
                    <svg class="topic-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        ${item.level === 3 
                            ? '<circle cx="12" cy="12" r="2" stroke-linecap="round" stroke-linejoin="round"/>'
                            : '<circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>'
                        }
                    </svg>
                    <span class="topic-name">${item.text}</span>
                `;
                
                topicItem.addEventListener('click', (e) => {
                    e.preventDefault();
                    const target = document.getElementById(`heading-${index}`);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
                
                topicList.appendChild(topicItem);
            });
        }

        // Add IDs to headings for linking
        function addHeadingIds() {
            const headings = document.querySelectorAll('.markdown-body h2, .markdown-body h3');
            headings.forEach((heading, index) => {
                heading.id = `heading-${index}`;
            });
        }

        // Scroll spy - highlight current section
        function initScrollSpy() {
            const headings = document.querySelectorAll('.markdown-body h2, .markdown-body h3');
            const topicItems = document.querySelectorAll('.topic-item');
            
            // Options for intersection observer
            const observerOptions = {
                root: null,
                rootMargin: '-10% 0px -60% 0px',
                threshold: 0
            };

            // Create intersection observer
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const headingId = entry.target.id;
                        const index = headingId.replace('heading-', '');
                        
                        // Remove active class from all items
                        topicItems.forEach(item => item.classList.remove('active'));
                        
                        // Add active class to current item
                        const activeItem = topicItems[index];
                        if (activeItem) {
                            activeItem.classList.add('active');
                        }
                    }
                });
            }, observerOptions);

            // Observe all headings
            headings.forEach(heading => observer.observe(heading));
        }

        // Load note when page loads
        document.addEventListener('DOMContentLoaded', loadNote);
    </script>
</body>

</html>
