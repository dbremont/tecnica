<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Viewer - Epistemic Toolbox</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-deep: #080a0f;
            --bg-primary: #0d1117;
            --bg-elevated: #151b24;
            --bg-card: rgba(20, 26, 35, 0.65);
            --fg-primary: #f0f4f8;
            --fg-secondary: #8b95a5;
            --fg-muted: #4a5568;
            --accent-primary: #d4a84b;
            --accent-secondary: #5ec4b2;
            --accent-glow: rgba(212, 168, 75, 0.15);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-elevated: rgba(255, 255, 255, 0.1);
            --border-accent: rgba(212, 168, 75, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-deep);
            color: var(--fg-primary);
            line-height: 1.5;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        main {
            flex: 1;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--fg-muted);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .bg-atmosphere {
            position: fixed;
            inset: 0;
            z-index: -2;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212, 168, 75, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(94, 196, 178, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-primary) 100%);
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.4;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 95% 70% at 50% 30%, black, transparent);
        }

        .bg-noise {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .nav-blur {
            background: rgba(8, 10, 15, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-bottom: 1px solid var(--border-subtle);
            height: 72px;
            display: flex;
            align-items: center;
        }

        .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            position: relative;
            padding: 0;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.15, 0.8, 0.3, 1);
        }

        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 2rem;
        }

        .tool-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--fg-primary);
        }

        .tool-display .separator {
            color: var(--fg-muted);
            font-weight: 400;
            margin: 0 0.5rem;
        }

        .tool-display .tool-name {
            color: var(--accent-primary);
            font-weight: 600;
        }

        .brand-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: radial-gradient(ellipse at center, rgba(212, 168, 75, 0.08), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .brand-container:hover::before {
            opacity: 1;
        }

        .brand-icon {
            position: relative;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon svg {
            width: 28px;
            height: 28px;
            stroke: var(--accent-primary);
            stroke-width: 1.5;
            fill: none;
            filter: drop-shadow(0 0 6px rgba(212, 168, 75, 0.4));
            transition: all 0.4s ease;
        }

        .brand-container:hover .brand-icon svg {
            filter: drop-shadow(0 0 12px rgba(212, 168, 75, 0.6));
            transform: rotate(10deg) scale(1.05);
        }

        .brand-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            color: var(--fg-primary);
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .brand-text .separator {
            color: var(--fg-muted);
            font-weight: 400;
            margin-right: 0.25em;
        }

        .brand-text span {
            color: var(--fg-secondary);
            font-weight: 400;
            margin-right: 0.25em;
        }

        /* Tool Container */
        .tool-container {
            width: 100%;
            margin: 0 auto;
            padding: 6rem 2rem 3rem 2rem;
        }

        /* Dynamic max-width for larger screens - leaves ~20% margin on each side */
        @media (min-width: 1001px) {
            .tool-container {
                max-width: 80%;
            }
        }

        /* For very large screens, cap the max-width to prevent it from getting too wide */
        @media (min-width: 1400px) {
            .tool-container {
                max-width: 85%;
            }
        }

        .tool-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .tool-title-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .tool-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--fg-primary);
            letter-spacing: -0.03em;
        }

        .tool-path {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--fg-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tool-path::before {
            content: '/';
            color: var(--accent-secondary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(94, 196, 178, 0.1);
            border: 1px solid rgba(94, 196, 178, 0.2);
            border-radius: 8px;
            color: var(--accent-secondary);
            text-decoration: none;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .back-link:hover {
            background: rgba(94, 196, 178, 0.2);
            border-color: rgba(94, 196, 178, 0.4);
            transform: translateY(-2px);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Tool Content Container */
        .tool-content-wrapper {
            background: transparent;
            border: none;
            border-radius: 0;
            overflow: visible;
            backdrop-filter: none;
            position: relative;
            min-height: calc(100vh - 200px);
        }

        .tool-content-host {
            width: 100%;
            height: 100%;
        }

        /* Tool Control Panel */
        .tool-controls {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 100;
        }

        .tool-control-trigger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            background: rgba(20, 26, 35, 0.8);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--fg-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .tool-control-trigger:hover {
            background: rgba(212, 168, 75, 0.15);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .tool-control-trigger svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        .tool-control-trigger.active {
            background: rgba(212, 168, 75, 0.2);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .tool-options-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: rgba(20, 26, 35, 0.95);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 0.5rem;
            display: none;
            flex-direction: column;
            gap: 0.25rem;
            min-width: 180px;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .tool-options-menu.show {
            display: flex;
        }

        .tool-option-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 0.875rem;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--fg-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: left;
            width: 100%;
        }

        .tool-option-btn:hover {
            background: rgba(212, 168, 75, 0.1);
            color: var(--accent-primary);
        }

        .tool-option-btn svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
            flex-shrink: 0;
        }

        .tool-option-divider {
            height: 1px;
            background: var(--border-subtle);
            margin: 0.25rem 0;
        }

        /* Loading State */
        .loading-state {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(12px);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .loading-state.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-elevated);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--fg-muted);
        }

        /* Error State */
        .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            min-height: 400px;
            text-align: center;
            background: rgba(20, 26, 35, 0.5);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
        }

        .error-icon {
            width: 64px;
            height: 64px;
            stroke: var(--fg-muted);
            stroke-width: 1.5;
            fill: none;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .error-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--fg-primary);
            margin-bottom: 0.75rem;
        }

        .error-message {
            font-size: 1rem;
            color: var(--fg-muted);
            max-width: 500px;
            line-height: 1.6;
        }

        /* Footer */
        .site-footer {
            background: rgba(8, 10, 15, 0.75);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-top: 1px solid var(--border-subtle);
            padding: 2rem 0;
            position: relative;
        }

        .footer-bg-fade {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(8, 10, 15, 0.3) 100%);
            pointer-events: none;
        }

        .footer-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-subtle), transparent);
            margin-bottom: 2rem;
        }

        .footer-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--fg-primary);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-brand:hover {
            color: var(--accent-primary);
        }

        .footer-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .footer-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--fg-secondary);
            transition: all 0.25s ease;
            cursor: pointer;
            text-decoration: none;
            background: none;
            border: none;
            padding: 0.5rem 0;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: 0.25rem;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent-primary);
            transition: width 0.3s ease;
        }

        .footer-link:hover {
            color: var(--fg-primary);
        }

        .footer-link:hover::after {
            width: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .tool-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }

            .footer-inner {
                flex-direction: column;
                align-items: center;
                gap: 1.5rem;
            }

            .footer-links {
                flex-wrap: wrap;
                justify-content: center;
            }

            .tool-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-atmosphere"></div>
    <div class="bg-pattern"></div>
    <div class="bg-noise"></div>

    <!-- Header -->
    <nav class="fixed top-0 left-0 right-0 z-50 nav-blur">
        <div class="tool-container" style="padding: 0 2rem;">
            <div class="nav-content" style="height: 100%; display: flex; align-items: center;">
                <a href="/toolbox" class="brand-container">
                    <div class="brand-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 2L2 7l10 5 10-5-10-5z" />
                            <path d="M2 17l10 5 10-5" />
                            <path d="M2 12l10 5 10-5" />
                        </svg>
                    </div>
                    <div class="brand-text"><span>Epistemic</span>Toolbox</div>
                </a>
                
                <div class="tool-display">
                    <span>Toolbox</span>
                    <span class="separator">|</span>
                    <span class="tool-name" id="nav-tool-name">Tool</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="tool-container">
            <!-- Tool Header -->
            <div class="tool-header">
                <div class="tool-title-group">
                    <h1 class="tool-title" id="tool-title">Tool Viewer</h1>
                    <div class="tool-path" id="tool-path">src/</div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loading" class="loading-state">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading tool...</div>
            </div>

            <!-- Error State -->
            <div id="error" class="error-state" style="display: none;">
                <svg class="error-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke-width="1.5"/>
                    <path d="M12 8v4" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M12 16h.01" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                <h1 class="error-title">Tool Not Found</h1>
                <p class="error-message" id="errorMessage">The requested tool could not be loaded.</p>
            </div>

            <!-- Tool Content Container -->
            <div class="tool-content-wrapper" id="tool-content-wrapper" style="display: none;">
                <div class="tool-controls" id="tool-controls" style="display: flex;">
                    <button class="tool-control-trigger" id="tool-menu-btn" title="Tool Options">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="1" stroke-width="2"/>
                            <circle cx="12" cy="5" r="1" stroke-width="2"/>
                            <circle cx="12" cy="19" r="1" stroke-width="2"/>
                        </svg>
                    </button>
                    <div class="tool-options-menu" id="tool-options-menu">
                        <button class="tool-option-btn" id="btn-help" title="Open Help">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="12" cy="12" r="10" stroke-width="1.5"/>
                                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" stroke-width="1.5" stroke-linecap="round"/>
                                <path d="M12 17h.01" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                            Help
                        </button>
                        <button class="tool-option-btn" id="btn-reset" title="Reset Tool">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M3 3v5h5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Reset
                        </button>
                        <button class="tool-option-btn" id="btn-refresh" title="Refresh Tool">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M23 4v6h-6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Refresh
                        </button>
                        <div class="tool-option-divider"></div>
                    </div>
                </div>
                <div class="tool-content-host" id="tool-content-host"></div>
                <div class="loading-state" id="tool-loading">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">Loading tool content...</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-bg-fade"></div>
        <div class="tool-container" style="padding: 2rem 2rem 2rem 2rem;">
            <div class="footer-divider"></div>
            <div class="footer-inner">
                <a href="/toolbox" class="footer-brand">Epistemic Toolbox</a>
                <div class="footer-links">
                    <a href="about.html" class="footer-link">About</a>
                    <a href="docs.html" class="footer-link">Documentation</a>
                    <a href="terminology.html" class="footer-link">Terminology</a>
                </div>
            </div>
        </div>
    </footer>


</body>

<script src="js/view.js" ></script>

</html>
