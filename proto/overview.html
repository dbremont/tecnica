<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epistemic Map</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg-deep:#030306;--bg-primary:#07070d;--bg-secondary:#0c0c16;
  --bg-tertiary:#111120;--bg-card:#0e0e1a;
  --border:rgba(255,255,255,0.05);--border-light:rgba(255,255,255,0.1);
  --text-primary:#e4e4f0;--text-secondary:#7878a0;--text-dim:#4a4a6a;
  --accent:#00ffc8;--accent-dim:rgba(0,255,200,0.12);
  --orange:#ff6b35;--pink:#ff3d71;--gold:#ffd60a;--cyan:#00c9db;
  --coral:#ef476f;--mint:#7dffaf;--emerald:#06d6a0;--sky:#4cc9f0;--teal:#1b9aaa;
  --sidebar-w:250px;--sidebar-collapsed:62px;--topbar-h:52px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);color:var(--text-primary);font-family:'Space Grotesk',sans-serif;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px;}

#app{display:flex;height:100vh;}

/* Sidebar */
#sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);height:100vh;background:var(--bg-primary);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:all .3s ease;z-index:20;position:relative;overflow:hidden;}
#sidebar.collapsed{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed);}
#sidebar.collapsed .nav-label,#sidebar.collapsed .sidebar-title span,#sidebar.collapsed .nav-section-toggle,#sidebar.collapsed .sidebar-subtitle,#sidebar.collapsed .nav-section-label{display:none;}
#sidebar.collapsed .nav-section-header{justify-content:center;padding:10px 0;}
#sidebar.collapsed .nav-item{justify-content:center;padding:8px 0;}
#sidebar.collapsed .nav-icon{margin-right:0;}
#sidebar.collapsed .nav-section-items{max-height:0!important;}

.sidebar-header{padding:20px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sidebar-title{font-size:15px;font-weight:700;letter-spacing:1.5px;color:var(--accent);display:flex;align-items:center;gap:8px;white-space:nowrap;}
.sidebar-title i{font-size:14px;}
.collapse-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:13px;padding:4px;transition:color .2s;}
.collapse-btn:hover{color:var(--text-primary);}
.sidebar-subtitle{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:4px;text-transform:uppercase;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0;}

.nav-section{margin-bottom:2px;}
.nav-section-header{display:flex;align-items:center;padding:10px 18px;cursor:pointer;color:var(--text-dim);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;transition:color .2s;user-select:none;}
.nav-section-header:hover{color:var(--text-secondary);background:rgba(255,255,255,0.015);}
.nav-section-header .nav-icon{width:18px;text-align:center;margin-right:10px;font-size:12px;flex-shrink:0;}
.nav-section-label{flex:1;white-space:nowrap;}
.nav-section-toggle{font-size:9px;transition:transform .25s ease;margin-left:auto;}
.nav-section.collapsed .nav-section-toggle{transform:rotate(-90deg);}
.nav-section-items{overflow:hidden;max-height:400px;transition:max-height .3s ease;}
.nav-section.collapsed .nav-section-items{max-height:0;}

.nav-item{display:flex;align-items:center;padding:8px 18px 8px 36px;cursor:pointer;color:var(--text-secondary);transition:all .2s;font-size:12px;border-left:2px solid transparent;}
.nav-item:hover{color:var(--text-primary);background:rgba(255,255,255,0.02);}
.nav-item.active{color:var(--accent);background:var(--accent-dim);border-left-color:var(--accent);}
.nav-item .nav-icon{width:18px;text-align:center;margin-right:8px;font-size:11px;flex-shrink:0;}
.nav-label{white-space:nowrap;}
.nav-item.depth-0{padding-left:18px;}

/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-deep);}
#topbar{height:var(--topbar-h);min-height:var(--topbar-h);background:var(--bg-primary);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:10;}
.view-title{font-size:14px;font-weight:600;color:var(--text-primary);letter-spacing:.5px;}
.view-controls{display:flex;align-items:center;gap:10px;}
.view-controls select,.view-controls button{background:var(--bg-tertiary);border:1px solid var(--border-light);color:var(--text-primary);font-family:inherit;font-size:11px;padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .2s;}
.view-controls button:hover{border-color:var(--accent);color:var(--accent);}
.view-controls select:focus,.view-controls button:focus{outline:none;border-color:var(--accent);}
.node-count-badge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text-dim);background:rgba(255,255,255,0.04);padding:3px 10px;border-radius:4px;}
.ctrl-sep{width:1px;height:20px;background:var(--border-light);}

#view-container{flex:1;position:relative;overflow:hidden;}
.view-panel{position:absolute;inset:0;display:none;}
.view-panel.active{display:flex;flex-direction:column;}
.view-canvas{width:100%;height:100%;display:block;}

/* Tooltip */
#tooltip{position:fixed;z-index:100;background:rgba(8,8,16,0.97);border:1px solid var(--border-light);border-radius:12px;padding:0;width:370px;backdrop-filter:blur(20px) saturate(1.4);opacity:0;transition:opacity .2s ease-out,transform .2s ease-out;font-size:12px;line-height:1.5;box-shadow:0 16px 64px rgba(0,0,0,0.7);transform:translateY(6px);overflow:hidden;pointer-events:auto;max-height:80vh;overflow-y:auto;}
#tooltip.visible{opacity:1;transform:translateY(0);}
#tooltip::-webkit-scrollbar{width:3px;}#tooltip::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

.tt-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.tt-name{font-size:15px;font-weight:700;margin-bottom:6px;letter-spacing:0.2px;}
.tt-badges{display:flex;gap:5px;flex-wrap:wrap;}
.tt-badge{font-size:8px;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;}

.tt-section{padding:10px 16px;border-bottom:1px solid var(--border);}
.tt-section:last-of-type{border-bottom:none;}
.tt-section-label{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:7px;font-weight:700;}

.tt-sig-grid{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:10px;}
.tt-sig-key{color:var(--text-dim);white-space:nowrap;}
.tt-sig-val{color:var(--text-secondary);text-align:right;}
.tt-desc{color:var(--text-secondary);font-size:11px;line-height:1.55;}

.tt-rel-cols{display:flex;gap:12px;}
.tt-rel-col{flex:1;min-width:0;}
.tt-rel-col-title{font-size:9px;font-weight:600;margin-bottom:4px;letter-spacing:0.5px;}
.tt-rel-item{font-size:10px;color:var(--text-secondary);padding:2px 0;display:flex;align-items:center;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tt-rel-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.tt-rel-more{font-size:9px;color:var(--text-dim);font-style:italic;padding-top:2px;}

.tt-status-grid{display:flex;flex-direction:column;gap:4px;}
.tt-status-item{font-size:10px;display:flex;align-items:center;gap:6px;}
.tt-status-icon{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0;}
.tt-status-label{color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tt-status-empty{font-size:10px;color:var(--text-dim);font-style:italic;}

.tt-hops{display:flex;gap:10px;}
.tt-hop{text-align:center;flex:1;}
.tt-hop-val{font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.tt-hop-label{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}

.tt-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--border);background:rgba(255,255,255,0.015);}
.tt-action-btn{flex:1;padding:6px;border:1px solid var(--border-light);border-radius:5px;background:rgba(255,255,255,0.02);color:var(--text-secondary);font-size:10px;font-weight:500;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px;}
.tt-action-btn:hover{background:rgba(255,255,255,0.07);color:var(--text-primary);border-color:var(--accent);}
.tt-action-btn i{font-size:9px;}

/* Overview */
.overview-scroll{overflow-y:auto;height:100%;padding:32px;}
.overview-hero{text-align:center;padding:40px 0 32px;}
.overview-hero h1{font-size:48px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
.overview-hero p{color:var(--text-secondary);font-size:15px;max-width:600px;margin:0 auto;line-height:1.7;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin:28px 0;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px;text-align:left;transition:border-color .3s;}
.stat-card:hover{border-color:var(--border-light);}
.stat-card .stat-val{font-size:28px;font-weight:800;line-height:1;}
.stat-card .stat-label{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:6px;}
.type-legend{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:20px;}
.type-legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);}
.type-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-content{background:var(--bg-secondary);border:1px solid var(--border-light);border-radius:14px;padding:28px;max-width:90vw;max-height:85vh;overflow:auto;position:relative;min-width:600px;}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;}
.modal-close:hover{color:var(--text-primary);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;}

/* About */
.about-content{max-width:720px;margin:0 auto;padding:40px 32px;overflow-y:auto;height:100%;}
.about-content h2{font-size:24px;font-weight:700;margin-bottom:12px;color:var(--accent);}
.about-content h3{font-size:16px;font-weight:600;margin:20px 0 8px;}
.about-content p{color:var(--text-secondary);line-height:1.8;font-size:13px;margin-bottom:12px;}
.about-content table{width:100%;border-collapse:collapse;margin:16px 0;font-size:12px;}
.about-content th{text-align:left;padding:8px 10px;background:var(--bg-tertiary);color:var(--text-secondary);font-weight:600;font-size:10px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border-light);}
.about-content td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-secondary);}

@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease;}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
@media(max-width:768px){
  #sidebar{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed);}
  .nav-label,.sidebar-title span,.nav-section-toggle,.sidebar-subtitle,.nav-section-label{display:none;}
  .nav-item{justify-content:center;padding:8px 0;}.nav-icon{margin-right:0;}
  .nav-section-header{justify-content:center;}.nav-section-items{max-height:0!important;}
  .overview-hero h1{font-size:32px;}
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="sidebar-title"><i class="fa-solid fa-share-nodes"></i> <span>Epistemic Map</span></div>
        <div class="sidebar-subtitle">Multi-layer epistemic hypergraph</div>
      </div>
      <button class="collapse-btn" id="collapseBtn" aria-label="Toggle sidebar"><i class="fa-solid fa-angles-left"></i></button>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item depth-0 active" data-view="overview"><span class="nav-icon"><i class="fa-solid fa-compass"></i></span><span class="nav-label">Overview</span></div>

      <div class="nav-section" data-section="hypergraph">
        <div class="nav-section-header"><span class="nav-icon"><i class="fa-solid fa-diagram-project"></i></span><span class="nav-section-label">Hypergraph</span><i class="fa-solid fa-chevron-down nav-section-toggle"></i></div>
        <div class="nav-section-items">
          <div class="nav-item" data-view="hypergraph"><span class="nav-icon"><i class="fa-solid fa-circle-nodes"></i></span><span class="nav-label">Interactive View</span></div>
          <div class="nav-item" data-view="evaluation"><span class="nav-icon"><i class="fa-solid fa-clipboard-check"></i></span><span class="nav-label">Evaluation Coverage</span></div>
        </div>
      </div>

      <div class="nav-section" data-section="analysis">
        <div class="nav-section-header"><span class="nav-icon"><i class="fa-solid fa-chart-line"></i></span><span class="nav-section-label">Analysis</span><i class="fa-solid fa-chevron-down nav-section-toggle"></i></div>
        <div class="nav-section-items">
          <div class="nav-item" data-view="representation"><span class="nav-icon"><i class="fa-solid fa-layer-group"></i></span><span class="nav-label">Representation Coverage</span></div>
          <div class="nav-item" data-view="embedding"><span class="nav-icon"><i class="fa-solid fa-braille"></i></span><span class="nav-label">Embedding Projection</span></div>
          <div class="nav-item" data-view="heatmap"><span class="nav-icon"><i class="fa-solid fa-table-cells"></i></span><span class="nav-label">Adjacency Heatmap</span></div>
          <div class="nav-item" data-view="cluster"><span class="nav-icon"><i class="fa-solid fa-object-group"></i></span><span class="nav-label">Domain Clusters</span></div>
          <div class="nav-item" data-view="degree"><span class="nav-icon"><i class="fa-solid fa-chart-column"></i></span><span class="nav-label">Degree Distribution</span></div>
        </div>
      </div>

      <div class="nav-section" data-section="info">
        <div class="nav-section-header"><span class="nav-icon"><i class="fa-solid fa-circle-info"></i></span><span class="nav-section-label">Info</span><i class="fa-solid fa-chevron-down nav-section-toggle"></i></div>
        <div class="nav-section-items">
          <div class="nav-item" data-view="about"><span class="nav-icon"><i class="fa-solid fa-book"></i></span><span class="nav-label">About</span></div>
        </div>
      </div>
    </nav>
  </aside>

  <main id="main">
    <header id="topbar">
      <div class="view-title" id="viewTitle">Overview</div>
      <div class="view-controls" id="viewControls"></div>
    </header>
    <div id="view-container">
      <div class="view-panel active" id="panel-overview"><div class="overview-scroll" id="overviewContent"></div></div>
      <div class="view-panel" id="panel-hypergraph"><canvas class="view-canvas" id="canvasHypergraph"></canvas></div>
      <div class="view-panel" id="panel-evaluation"><canvas class="view-canvas" id="canvasEvaluation"></canvas></div>
      <div class="view-panel" id="panel-representation"><canvas class="view-canvas" id="canvasRepresentation"></canvas></div>
      <div class="view-panel" id="panel-embedding"><canvas class="view-canvas" id="canvasEmbedding"></canvas></div>
      <div class="view-panel" id="panel-heatmap"><canvas class="view-canvas" id="canvasHeatmap"></canvas></div>
      <div class="view-panel" id="panel-cluster"><canvas class="view-canvas" id="canvasCluster"></canvas></div>
      <div class="view-panel" id="panel-degree"><canvas class="view-canvas" id="canvasDegree"></canvas></div>
      <div class="view-panel" id="panel-about"><div class="about-content" id="aboutContent"></div></div>
    </div>
  </main>
</div>

<div id="tooltip"></div>
<div class="modal-overlay" id="evalModal">
  <div class="modal-content" id="evalModalContent">
    <button class="modal-close" id="evalModalClose"><i class="fa-solid fa-xmark"></i></button>
    <div class="modal-title">Evaluation Coverage Matrix</div>
    <canvas id="canvasEvalModal" width="800" height="500"></canvas>
  </div>
</div>

  getRepresentationCoverage(){const artifacts=this.getNodesByType('EpistemicArtifact'),reps=this.getNodesByType('EpistemicRepresentation'),matrix={};artifacts.forEach(a=>{matrix[a.id]={};reps.forEach(r=>matrix[a.id][r.id]=0);});this.links.forEach(l=>{if(l.type==='REPRESENTS'){const s=this.nodeMap[l.source],t=this.nodeMap[l.target];if(s?.type==='EpistemicArtifact'&&t?.type==='EpistemicRepresentation')matrix[l.source][l.target]=1;if(t?.type==='EpistemicArtifact'&&s?.type==='EpistemicRepresentation')matrix[l.target][l.source]=1;}});return{artifacts,reps,matrix};}
  getEvaluationCoverage(){const artifacts=this.getNodesByType('EpistemicArtifact'),standards=this.getNodesByType('EpistemicStandard'),matrix={};artifacts.forEach(a=>{matrix[a.id]={};standards.forEach(s=>matrix[a.id][s.id]=0);});this.links.forEach(l=>{if(l.type==='EVALUATES'){const s=this.nodeMap[l.source],t=this.nodeMap[l.target];if(s?.type==='EpistemicArtifact'&&t?.type==='EpistemicStandard')matrix[l.source][l.target]=1;if(t?.type==='EpistemicArtifact'&&s?.type==='EpistemicStandard')matrix[l.target][l.source]=1;}});return{artifacts,standards,matrix};}
  getOutgoingEdges(nodeId){const node=this.nodeMap[nodeId];if(!node)return[];return(node.edges||[]).map(e=>({type:e.type,target:this.nodeMap[e.node],meta:e.meta})).filter(e=>e.target);}
  getIncomingEdges(nodeId){const inc=[];this.nodes.forEach(n=>{(n.edges||[]).forEach(e=>{if(e.node===nodeId)inc.push({type:e.type,source:n,meta:e.meta});});});return inc;}

}

/* ═══════════════ PROGRESSIVE EXPANSION ═══════════════ */
const expansion={visibleNodes:new Set(),expandedNodes:new Set(),maxNodes:100,initialCount:25,
  initialize(){const sorted=[...data.nodes].sort((a,b)=>b.degree-a.degree);this.visibleNodes=new Set(sorted.slice(0,this.initialCount).map(n=>n.id));this.expandedNodes.clear();},
  expand(nodeId){if(!data.adjacency[nodeId])return 0;let added=0;data.adjacency[nodeId].forEach(nId=>{if(this.visibleNodes.size<this.maxNodes&&!this.visibleNodes.has(nId)){this.visibleNodes.add(nId);added++;}});this.expandedNodes.add(nodeId);return added;},
  collapse(nodeId){if(!data.adjacency[nodeId])return;const otherExpanded=new Set([...this.expandedNodes].filter(id=>id!==nodeId));const sorted=[...data.nodes].sort((a,b)=>b.degree-a.degree);const anchorIds=new Set(sorted.slice(0,this.initialCount).map(n=>n.id));data.adjacency[nodeId].forEach(nId=>{if(this.expandedNodes.has(nId)||anchorIds.has(nId))return;let keep=false;otherExpanded.forEach(eId=>{if(data.adjacency[eId]?.has(nId))keep=true;});if(!keep)this.visibleNodes.delete(nId);});this.expandedNodes.delete(nodeId);},
  focus(nodeId,k){const neighbors=data.getNeighbors(nodeId,k);this.visibleNodes=new Set([...neighbors].slice(0,this.maxNodes));this.expandedNodes.clear();this.expandedNodes.add(nodeId);},
  reset(){this.initialize();},
  isExpanded(nodeId){return this.expandedNodes.has(nodeId);},
  hiddenNeighborCount(nodeId){if(!data.adjacency[nodeId])return 0;let c=0;data.adjacency[nodeId].forEach(nId=>{if(!this.visibleNodes.has(nId))c++;});return c;}
};

/* ═══════════════ COMMUNITY DETECTION ═══════════════ */
function detectCommunities(){
  const nodes=data.nodes,labels={};
  const typeMap={};let idx=0;
  nodes.forEach(n=>{if(!(n.type in typeMap))typeMap[n.type]=idx++;labels[n.id]=typeMap[n.type];});
  for(let iter=0;iter<40;iter++){let changed=false;const shuffled=[...nodes].sort(()=>Math.random()-0.5);shuffled.forEach(n=>{const neighbors=data.adjacency[n.id];if(!neighbors||neighbors.size===0)return;const counts={};neighbors.forEach(nId=>{const l=labels[nId];counts[l]=(counts[l]||0)+1;});let best=labels[n.id],bestCount=0;Object.entries(counts).forEach(([l,c])=>{if(c>bestCount||(c===bestCount&&Math.random()>0.5)){bestCount=c;best=parseInt(l);}});if(best!==labels[n.id]){labels[n.id]=best;changed=true;}});if(!changed)break;}
  const uniqueLabels=[...new Set(Object.values(labels))];const colorMap={};uniqueLabels.forEach((l,i)=>{colorMap[l]=COMMUNITY_PALETTE[i%COMMUNITY_PALETTE.length];});
  const communities={};uniqueLabels.forEach(l=>{communities[l]={color:colorMap[l],nodes:[]};});nodes.forEach(n=>{communities[labels[n.id]].nodes.push(n);});
  return{labels,colorMap,communities,uniqueLabels};
}

function lighten(hex,amt=60){let r=Math.min(255,parseInt(hex.slice(1,3),16)+amt),g=Math.min(255,parseInt(hex.slice(3,5),16)+amt),b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);return`rgb(${r},${g},${b})`;}

/* ═══════════════ FORCE SIMULATION ═══════════════ */
function initSimulation(w,h){
  expansion.initialize();
  const visNodes=data.nodes.filter(n=>expansion.visibleNodes.has(n.id)).map(n=>({...n}));
  const visNodeIds=new Set(visNodes.map(n=>n.id));
  const visLinks=data.links.filter(l=>visNodeIds.has(l.source.id||l.source)&&visNodeIds.has(l.target.id||l.target)).map(l=>({...l}));
  state.simNodes=visNodes;state.simLinks=visLinks;
  if(state.simulation)state.simulation.stop();
  const sim=d3.forceSimulation(visNodes)
    .force('link',d3.forceLink(visLinks).id(d=>d.id).distance(90).strength(0.4))
    .force('charge',d3.forceManyBody().strength(-350))
    .force('center',d3.forceCenter(w/2,h/2))
    .force('collision',d3.forceCollide().radius(28))
    .force('x',d3.forceX(w/2).strength(0.03))
    .force('y',d3.forceY(h/2).strength(0.03))
    .alphaDecay(0.02).on('tick',()=>{state.needsRender=true;});
  state.simulation=sim;return sim;
}

function rebuildSimulation(){
  if(!hypergraphCanvas)return;
  const rect=hypergraphCanvas.parentElement.getBoundingClientRect();
  const existingPos={};if(state.simNodes)state.simNodes.forEach(n=>{existingPos[n.id]={x:n.x,y:n.y};});
  const visNodes=data.nodes.filter(n=>expansion.visibleNodes.has(n.id)).map(n=>({...n,x:existingPos[n.id]?.x||rect.width/2,y:existingPos[n.id]?.y||rect.height/2}));
  const visNodeIds=new Set(visNodes.map(n=>n.id));
  const visLinks=data.links.filter(l=>visNodeIds.has(l.source.id||l.source)&&visNodeIds.has(l.target.id||l.target)).map(l=>({...l}));
  state.simNodes=visNodes;state.simLinks=visLinks;
  if(state.simulation)state.simulation.stop();
  state.simulation=d3.forceSimulation(visNodes)
    .force('link',d3.forceLink(visLinks).id(d=>d.id).distance(90).strength(0.4))
    .force('charge',d3.forceManyBody().strength(-350))
    .force('center',d3.forceCenter(rect.width/2,rect.height/2))
    .force('collision',d3.forceCollide().radius(28))
    .force('x',d3.forceX(rect.width/2).strength(0.03))
    .force('y',d3.forceY(rect.height/2).strength(0.03))
    .alphaDecay(0.02).alpha(0.5).on('tick',()=>{state.needsRender=true;});
  state.simulation.restart();
}

function getNodePositions(){const pos={};if(state.simNodes)state.simNodes.forEach(n=>pos[n.id]=n);return pos;}

/* ═══════════════ GRAPH RENDERING ═══════════════ */
function drawBackground(ctx,w,h){
  const grad=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*0.7);grad.addColorStop(0,'#0a0a18');grad.addColorStop(1,'#030306');ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.015)';ctx.lineWidth=0.5;const gs=40;for(let x=0;x<w;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}for(let y=0;y<h;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
}

function drawGraphEdges(ctx,pos,links,transform,selectedNode,hoveredNode,hopSet){
  links.forEach(l=>{
    const s=pos[l.source.id||l.source],t=pos[l.target.id||l.target];if(!s||!t)return;
    let alpha=0.12,width=0.8;const edgeColor=EDGE_COLORS[l.type]||'#555';
    if(selectedNode&&hopSet){const sId=s.id||l.source.id||l.source,tId=t.id||l.target.id||l.target;if(hopSet.has(sId)&&hopSet.has(tId)){alpha=0.5;width=1.2;}else{alpha=0.03;}}
    if(hoveredNode){const sId=s.id||l.source.id||l.source,tId=t.id||l.target.id||l.target;if(sId===hoveredNode.id||tId===hoveredNode.id){alpha=Math.max(alpha,0.6);width=Math.max(width,1.8);}}
    const sx=s.x*transform.k+transform.x,sy=s.y*transform.k+transform.y,tx=t.x*transform.k+transform.x,ty=t.y*transform.k+transform.y;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(tx,ty);ctx.strokeStyle=hexToRgba(edgeColor,alpha);ctx.lineWidth=width;ctx.stroke();
  });
}

function drawGraphNodes(ctx,pos,nodes,transform,selectedNode,hoveredNode,hopSet,pulsePhase,sizeFn,colorFn){
  const sizeF=sizeFn||(n=>NODE_RADIUS);const colorF=colorFn||(n=>TYPE_COLORS[n.type]||'#888');
  nodes.forEach(n=>{
    const p=pos[n.id];if(!p)return;
    const x=p.x*transform.k+transform.x,y=p.y*transform.k+transform.y,r=sizeF(n)*transform.k,color=colorF(n);
    let alpha=0.85,glowSize=12,showLabel=transform.k>0.6;
    if(selectedNode&&hopSet){if(!hopSet.has(n.id)){alpha=0.1;glowSize=0;showLabel=false;}else{alpha=1;glowSize=18;}}
    if(hoveredNode&&n.id===hoveredNode.id){alpha=1;glowSize=22;showLabel=true;}
    if(selectedNode&&n.id===selectedNode.id){const pulse=0.5+0.5*Math.sin(pulsePhase);ctx.beginPath();ctx.arc(x,y,r+8*pulse+6,0,Math.PI*2);ctx.strokeStyle=hexToRgba(color,0.15*pulse);ctx.lineWidth=2;ctx.stroke();}
    if(glowSize>0){ctx.shadowColor=color;ctx.shadowBlur=glowSize*transform.k;}
    ctx.beginPath();ctx.arc(x,y,Math.max(EPS,r),0,Math.PI*2);ctx.fillStyle=hexToRgba(color,alpha);ctx.fill();ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(x,y,Math.max(EPS,r*0.5),0,Math.PI*2);ctx.fillStyle=hexToRgba(lighten(color,80),alpha*0.7);ctx.fill();
    if(hoveredNode&&n.id===hoveredNode.id){ctx.beginPath();ctx.arc(x,y,Math.max(EPS,r+3),0,Math.PI*2);ctx.strokeStyle=hexToRgba(color,0.8);ctx.lineWidth=1.5;ctx.stroke();}
    const hidden=expansion.hiddenNeighborCount(n.id);
    if(hidden>0&&!(hoveredNode&&n.id===hoveredNode.id)){
      ctx.font=`bold 8px 'JetBrains Mono',monospace`;ctx.fillStyle=hexToRgba(color,0.9);ctx.textAlign='center';
      const badgeY=y-r-5*transform.k;ctx.fillText(`+${hidden}`,x,badgeY);
    }
    if(showLabel){ctx.font=`${Math.max(9,10*transform.k)}px 'Space Grotesk',sans-serif`;ctx.fillStyle=hexToRgba('#e4e4f0',alpha*0.8);ctx.textAlign='center';ctx.fillText(truncStr(n.name,24),x,y+r+14*transform.k);}
  });
}

/* ═══════════════ HYPERGRAPH VIEW ═══════════════ */
let hypergraphCanvas,hypergraphCtx,hypergraphW,hypergraphH;

function initHypergraph(){
  hypergraphCanvas=document.getElementById('canvasHypergraph');
  const setup=setupCanvas(hypergraphCanvas);hypergraphCtx=setup.ctx;hypergraphW=setup.w;hypergraphH=setup.h;
  if(!viewInited.hypergraph){
    initSimulation(hypergraphW,hypergraphH);
    hypergraphCanvas.addEventListener('mousemove',onHypergraphMouseMove);
    hypergraphCanvas.addEventListener('mousedown',onHypergraphMouseDown);
    hypergraphCanvas.addEventListener('mouseup',onHypergraphMouseUp);
    hypergraphCanvas.addEventListener('mouseleave',()=>{state.isDragging=false;state.isPanning=false;state.dragNode=null;state.hoveredNode=null;hideTooltip();state.needsRender=true;});
    hypergraphCanvas.addEventListener('wheel',onHypergraphWheel,{passive:false});
    hypergraphCanvas.addEventListener('dblclick',onHypergraphDblClick);
    viewInited.hypergraph=true;
  }
  state.needsRender=true;renderHypergraph();
}

function findNodeAt(mx,my){
  if(!state.simNodes)return null;const pos=getNodePositions();const{x,y}=screenToGraph(mx,my,state.transform);
  let closest=null,closestDist=Infinity;
  state.simNodes.forEach(n=>{const dx=x-n.x,dy=y-n.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<NODE_RADIUS+8&&dist<closestDist){closest=n;closestDist=dist;}});
  return closest;
}

function onHypergraphMouseMove(e){
  const rect=hypergraphCanvas.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  if(state.isDragging&&state.dragNode){const pos=screenToGraph(mx,my,state.transform);state.dragNode.fx=pos.x;state.dragNode.fy=pos.y;state.simulation.alpha(0.15).restart();return;}
  if(state.isPanning){state.transform.x=e.clientX-state.panStart.x;state.transform.y=e.clientY-state.panStart.y;state.needsRender=true;return;}
  const node=findNodeAt(mx,my);
  if(node!==state.hoveredNode){state.hoveredNode=node;state.needsRender=true;if(node)showTooltip(e.clientX,e.clientY,node);else hideTooltip();}
}

function onHypergraphMouseDown(e){
  const rect=hypergraphCanvas.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const node=findNodeAt(mx,my);
  if(node){state.isDragging=true;state.dragNode=node;node.fx=node.x;node.fy=node.y;state.simulation.alphaTarget(0.3).restart();}
  else{state.isPanning=true;state.panStart={x:e.clientX-state.transform.x,y:e.clientY-state.transform.y};}
}

function onHypergraphMouseUp(){
  if(state.isDragging&&state.dragNode){state.simulation.alphaTarget(0);state.dragNode.fx=null;state.dragNode.fy=null;state.dragNode=null;state.isDragging=false;}
  if(state.isPanning)state.isPanning=false;
}

function onHypergraphDblClick(e){
  const rect=hypergraphCanvas.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const node=findNodeAt(mx,my);
  if(node){state.selectedNode=(state.selectedNode?.id===node.id)?null:node;state.needsRender=true;hideTooltip();}
}

function onHypergraphWheel(e){
  e.preventDefault();const rect=hypergraphCanvas.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const scale=e.deltaY>0?0.92:1.08;const newK=Math.max(0.15,Math.min(6,state.transform.k*scale));const ratio=newK/state.transform.k;
  state.transform.x=mx-(mx-state.transform.x)*ratio;state.transform.y=my-(my-state.transform.y)*ratio;state.transform.k=newK;state.needsRender=true;
}

function renderHypergraph(){
  if(state.currentView!=='hypergraph')return;
  const ctx=hypergraphCtx,w=hypergraphW,h=hypergraphH;if(!ctx)return;
  drawBackground(ctx,w,h);
  const pos=getNodePositions();
  let hopSet=null;if(state.selectedNode&&state.hopK>0)hopSet=data.getNeighbors(state.selectedNode.id,state.hopK);

  const centrality=data.getCentrality();
  let sizeFn,colorFn;
  if(state.visMode==='centrality'){
    sizeFn=n=>4+(centrality[n.id]||0)*14;colorFn=n=>TYPE_COLORS[n.type]||'#888';
  }else if(state.visMode==='community'){
    if(!state.communityData)state.communityData=detectCommunities();
    const cData=state.communityData;sizeFn=n=>NODE_RADIUS;colorFn=n=>cData.colorMap[cData.labels[n.id]]||TYPE_COLORS[n.type]||'#888';
  }else{sizeFn=n=>NODE_RADIUS;colorFn=null;}

  drawGraphEdges(ctx,pos,state.simLinks,state.transform,state.selectedNode,state.hoveredNode,hopSet);
  state.pulsePhase+=0.06;
  drawGraphNodes(ctx,pos,state.simNodes,state.transform,state.selectedNode,state.hoveredNode,hopSet,state.pulsePhase,sizeFn,colorFn);

  if(state.visMode==='centrality'){ctx.font='11px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(255,255,255,0.35)';ctx.textAlign='left';ctx.fillText('Node size = degree centrality',16,h-16);}
  if(state.visMode==='community'&&state.communityData){
    const cData=state.communityData;let ly=60;const lx=w-180;
    ctx.font='bold 9px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.textAlign='left';ctx.fillText('COMMUNITIES',lx,ly);ly+=16;
    cData.uniqueLabels.forEach(l=>{const com=cData.communities[l];ctx.fillStyle=com.color;ctx.beginPath();ctx.arc(lx+5,ly-3,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(228,228,240,0.7)';ctx.font='10px "Space Grotesk",sans-serif';ctx.fillText(`${com.nodes.length} nodes`,lx+16,ly);ly+=18;});
  }

  if(state.selectedNode){ctx.font='12px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.textAlign='left';ctx.fillText(`Selected: ${state.selectedNode.name} | K-hop: ${state.hopK}`,16,h-16);}
  requestAnimationFrame(renderHypergraph);
}

/* ═══════════════ MATRIX HELPER ═══════════════ */
function drawMatrix(ctx,w,h,rowNodes,colNodes,matrix,accentColor,title){
  drawBackground(ctx,w,h);const cellW=Math.max(10,Math.min(40,(w-220)/colNodes.length));const cellH=Math.max(10,Math.min(40,(h-160)/rowNodes.length));const startX=180;const startY=100;
  ctx.font='bold 16px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(228,228,240,0.8)';ctx.textAlign='left';ctx.fillText(title,20,40);
  ctx.font='9px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(228,228,240,0.6)';
  colNodes.forEach((c,i)=>{ctx.save();ctx.translate(startX+i*cellW+cellW/2,startY-10);ctx.rotate(-Math.PI/3);ctx.textAlign='left';ctx.fillText(truncStr(c.name.replace(/^(Representation:|Standard:)\s*/,''),16),0,0);ctx.restore();});
  rowNodes.forEach((r,ri)=>{const y=startY+ri*cellH;ctx.font='9px "Space Grotesk",sans-serif';ctx.fillStyle=TYPE_COLORS[r.type]||'rgba(228,228,240,0.6)';ctx.textAlign='right';ctx.fillText(truncStr(r.name.replace(/^(Artifact:)\s*/,''),20),startX-10,y+cellH/2+3);
    colNodes.forEach((c,ci)=>{const x=startX+ci*cellW;const val=matrix[r.id]?.[c.id]||0;ctx.fillStyle=val>0?hexToRgba(accentColor,0.6+val*0.4):'rgba(255,255,255,0.02)';ctx.fillRect(x+1,y+1,cellW-2,cellH-2);if(val>0){ctx.shadowColor=accentColor;ctx.shadowBlur=4;ctx.fillRect(x+1,y+1,cellW-2,cellH-2);ctx.shadowBlur=0;}});
  });
}

/* ═══════════════ EMBEDDING ═══════════════ */
function initEmbedding(){
  const canvas=document.getElementById('canvasEmbedding');const{ctx,w,h}=setupCanvas(canvas);drawBackground(ctx,w,h);
  ctx.font='bold 16px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(228,228,240,0.8)';ctx.textAlign='left';ctx.fillText('Structural Embedding (Force Projection)',20,40);
  const pos=getNodePositions();const hasPos=Object.keys(pos).length>0&&pos[Object.keys(pos)[0]]?.x!==0;
  if(!hasPos){ctx.font='12px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillText('Visit Hypergraph View first to warm up simulation.',20,80);return;}
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;data.nodes.forEach(n=>{const p=pos[n.id];if(!p)return;if(p.x<minX)minX=p.x;if(p.x>maxX)maxX=p.x;if(p.y<minY)minY=p.y;if(p.y>maxY)maxY=p.y;});
  const rangeX=Math.max(1,maxX-minX),rangeY=Math.max(1,maxY-minY),padding=80;const scale=Math.min((w-padding*2)/rangeX,(h-padding*2-40)/rangeY);
  const normPos={};data.nodes.forEach(n=>{const p=pos[n.id];if(!p)return;normPos[n.id]={x:((p.x-minX)*scale)+padding+(((w-padding*2)-rangeX*scale)/2),y:((p.y-minY)*scale)+padding+40+(((h-padding*2-40)-rangeY*scale)/2)};});
  data.links.forEach(l=>{const sId=l.source.id||l.source,tId=l.target.id||l.target;const s=normPos[sId],t=normPos[tId];if(!s||!t)return;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;ctx.stroke();});
  data.nodes.forEach(n=>{const p=normPos[n.id];if(!p)return;const color=TYPE_COLORS[n.type];ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=hexToRgba(color,0.7);ctx.fill();});
  let ly=h-40,lx=20;ctx.font='9px "Space Grotesk",sans-serif';NODE_TYPES.forEach(t=>{ctx.fillStyle=TYPE_COLORS[t];ctx.beginPath();ctx.arc(lx+4,ly,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(228,228,240,0.5)';ctx.textAlign='left';ctx.fillText(t.replace('Epistemic',''),lx+12,ly+3);lx+=ctx.measureText(t.replace('Epistemic','')).width+28;if(lx>w-100){lx=20;ly-=20;}});
}

function initHeatmap(){
  const canvas=document.getElementById('canvasHeatmap');const{ctx,w,h}=setupCanvas(canvas);const matrix=data.getAdjacencyByType();const types=NODE_TYPES;
  drawBackground(ctx,w,h);const cellSize=Math.min(50,(Math.min(w,h)-200)/types.length);const startX=(w-types.length*cellSize)/2+40;const startY=100;
  ctx.font='bold 16px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(228,228,240,0.8)';ctx.textAlign='left';ctx.fillText('Type Adjacency Heatmap',20,40);
  let maxVal=1;types.forEach(r=>types.forEach(c=>{if(matrix[r][c]>maxVal)maxVal=matrix[r][c];}));

    types.forEach((c,ci)=>{const val=matrix[r][c];const alpha=val/maxVal;ctx.fillStyle=hexToRgba(TYPE_COLORS[r],Math.max(0.03,alpha*0.8));ctx.fillRect(startX+ci*cellSize+1,startY+ri*cellSize+1,cellSize-2,cellSize-2);if(val>0){ctx.font='9px "JetBrains Mono",monospace';ctx.fillStyle=`rgba(228,228,240,${alpha>0.5?0.9:0.5})`;ctx.textAlign='center';ctx.fillText(val,startX+ci*cellSize+cellSize/2,startY+ri*cellSize+cellSize/2+3);}});

/* ═══════════════ CLUSTER ═══════════════ */
function initCluster(){
  const canvas=document.getElementById('canvasCluster');const{ctx,w,h}=setupCanvas(canvas);drawBackground(ctx,w,h);
  const domains=data.getNodesByType('EpistemicDomain');const clusterPos={};const nodeToCluster={};
  const radius=Math.min(w,h)*0.3;domains.forEach((d,i)=>{const angle=(i/domains.length)*Math.PI*2-Math.PI/2;clusterPos[d.id]={x:w/2+Math.cos(angle)*radius,y:h/2+Math.sin(angle)*radius};});
  data.links.forEach(l=>{if(l.type==='TARGETS'){const tId=l.target.id||l.target;const sId=l.source.id||l.source;if(clusterPos[tId])nodeToCluster[sId]=tId;}});
  const pos={};domains.forEach(d=>pos[d.id]=clusterPos[d.id]);
  const clusterNodes={};domains.forEach(d=>clusterNodes[d.id]=[]);
  data.nodes.forEach(n=>{if(n.type==='EpistemicDomain')return;const domId=nodeToCluster[n.id];if(domId)clusterNodes[domId].push(n);else{if(!clusterNodes['center'])clusterNodes['center']=[];clusterNodes['center'].push(n);}});
  const centerPos={x:w/2,y:h/2};
  Object.keys(clusterNodes).forEach(domId=>{const center=clusterPos[domId]||centerPos;clusterNodes[domId].forEach((n,i)=>{const angle=(i/clusterNodes[domId].length)*Math.PI*2;const dist=40+Math.random()*60;pos[n.id]={x:center.x+Math.cos(angle)*dist,y:center.y+Math.sin(angle)*dist};});});
  data.links.forEach(l=>{const sId=l.source.id||l.source,tId=l.target.id||l.target;const s=pos[sId],t=pos[tId];if(!s||!t)return;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;ctx.stroke();});
  domains.forEach(d=>{const p=clusterPos[d.id];ctx.beginPath();ctx.arc(p.x,p.y,110,0,Math.PI*2);ctx.strokeStyle=hexToRgba(TYPE_COLORS.EpistemicDomain,0.15);ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);});
  data.nodes.forEach(n=>{const p=pos[n.id];if(!p)return;const color=TYPE_COLORS[n.type];const r=n.type==='EpistemicDomain'?10:5;ctx.shadowColor=color;ctx.shadowBlur=n.type==='EpistemicDomain'?15:8;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=hexToRgba(color,0.9);ctx.fill();ctx.shadowBlur=0;if(n.type==='EpistemicDomain'){ctx.font='bold 12px "Space Grotesk",sans-serif';ctx.fillStyle=hexToRgba(color,0.9);ctx.textAlign='center';ctx.fillText(n.name,p.x,p.y+24);}});
}

/* ═══════════════ DEGREE DISTRIBUTION ═══════════════ */
function initDegree(){
  const canvas=document.getElementById('canvasDegree');const{ctx,w,h}=setupCanvas(canvas);drawBackground(ctx,w,h);
  const dist=data.getDegreeDistribution();const sortedDegs=Object.keys(dist).map(Number).sort((a,b)=>a-b);const maxCount=Math.max(1,...Object.values(dist));
  const chartH=h-180,chartW=w-160,startX=100,startY=h-80,barW=Math.min(40,chartW/sortedDegs.length-8);
  ctx.font='bold 16px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(228,228,240,0.8)';ctx.textAlign='left';ctx.fillText('Degree Distribution',20,40);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(startX+chartW,startY);ctx.moveTo(startX,startY);ctx.lineTo(startX,startY-chartH);ctx.stroke();
  ctx.font='9px "JetBrains Mono",monospace';ctx.fillStyle='rgba(228,228,240,0.4)';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const yVal=(maxCount/4)*i;const yPos=startY-(yVal/maxCount)*chartH;ctx.fillText(Math.round(yVal),startX-10,yPos+3);ctx.beginPath();ctx.moveTo(startX,yPos);ctx.lineTo(startX+chartW,yPos);ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.stroke();}
  sortedDegs.forEach((deg,i)=>{const count=dist[deg];const barH=(count/maxCount)*chartH;const x=startX+(i*(chartW/sortedDegs.length))+((chartW/sortedDegs.length)-barW)/2;
    const grad=ctx.createLinearGradient(0,startY,0,startY-barH);grad.addColorStop(0,hexToRgba('#00ffc8',0.2));grad.addColorStop(1,hexToRgba('#00ffc8',0.8));
    ctx.fillStyle=grad;ctx.fillRect(x,startY-barH,barW,barH);ctx.shadowColor='#00ffc8';ctx.shadowBlur=6;ctx.fillRect(x,startY-barH,barW,2);ctx.shadowBlur=0;
    ctx.font='9px "JetBrains Mono",monospace';ctx.fillStyle='rgba(228,228,240,0.5)';ctx.textAlign='center';ctx.fillText(deg,x+barW/2,startY+16);});
  ctx.font='10px "Space Grotesk",sans-serif';ctx.fillStyle='rgba(228,228,240,0.5)';ctx.textAlign='center';ctx.fillText('Degree (k)',startX+chartW/2,startY+40);
  ctx.save();ctx.translate(30,startY-chartH/2);ctx.rotate(-Math.PI/2);ctx.fillText('Frequency P(k)',0,0);ctx.restore();
}
